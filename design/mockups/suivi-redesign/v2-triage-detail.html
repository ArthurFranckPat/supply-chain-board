<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Suivi — V2 « Triage + diagnostic »</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap"
  rel="stylesheet"

<style>
  /* ════════════════════════════════════════════════════════════
     V2 « Triage + diagnostic » — la table fusionne réactif ET
     proactif : plus de bascule. Liste groupée par urgence à gauche
     (Retard → À allouer → À expédier → RAS), panneau diagnostic à
     droite au clic : chaîne de cause en frise verticale (OF →
     composant → réception), emplacements, verdict projeté, actions.
     Tokens Navy : theme-aereco-navy.html.
     ──────────────────────────────────────────────────────────── */
  :root {
    --primary: #081061;
    --primary-soft: rgba(8, 16, 97, .07);
    --secondary: #b0d138;
    --success: #28a745;
    --info: #17a2b8;
    --warning: #b8860b;
    --warning-bright: #ffc107;
    --danger: #dc3545;
    --light: #f0f0ed;
    --gray: #6c757d;
    --color-background: var(--light);
    --color-foreground: #12142c;
    --color-card: #ffffff;
    --color-muted: #e7e5de;
    --color-muted-foreground: var(--gray);
    --color-border: #d9d6cb;
    --color-rule: #d9d6cb;
    --color-rule-soft: #eae8e0;
    --font-fraunces: "Fraunces", Georgia, serif;
    --font-sans: "Inter", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: var(--font-sans);
    background: var(--color-background); color: var(--color-foreground);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .material-symbols-outlined { font-family: "Material Symbols Outlined"; font-weight: normal; font-style: normal; line-height: 1; display: inline-block; vertical-align: middle; }

  /* ── Masthead ── */
  header.masthead { flex: none; background: var(--color-card); border-bottom: 1px solid var(--color-rule); }
  .masthead-top { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; padding: 13px 28px 8px; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .wordmark { font-family: var(--font-fraunces); font-size: 24px; font-weight: 900; line-height: .9; letter-spacing: -.01em; }
  .wordmark em { font-style: italic; font-weight: 500; color: var(--primary); }
  .subtitle { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-muted-foreground); padding-bottom: 2px; }
  .env-pill { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--color-border); background: var(--color-muted); color: var(--color-muted-foreground); border-radius: 999px; padding: 3px 9px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
  .env-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .meta { text-align: right; font-size: 11px; font-weight: 500; line-height: 1.6; color: var(--color-muted-foreground); }
  .meta b { color: var(--color-foreground); font-weight: 700; }
  .meta .week { font-family: var(--font-fraunces); font-weight: 700; font-size: 12px; color: var(--primary); text-transform: capitalize; }
  nav.tabs { display: flex; align-items: center; gap: 4px; border-top: 1px solid var(--color-rule-soft); padding: 0 28px; min-height: 42px; }
  nav.tabs a { text-decoration: none; font-size: 12px; font-weight: 600; color: var(--color-muted-foreground); padding: 11px 14px 9px; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
  nav.tabs a:hover { color: var(--primary); }
  nav.tabs a.active { color: var(--primary); border-color: var(--primary); }
  .user-chip { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }

  /* ── Toolbar (KPI intégrés en compteurs de groupe → pas de bandeau) ── */
  .toolbar { flex: none; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; padding: 9px 28px; border-bottom: 1px solid var(--color-rule); }
  .search { display: flex; align-items: center; gap: 6px; height: 30px; padding: 0 12px; border-radius: 999px; border: 1px solid var(--color-border); background: var(--color-card); font-size: 12px; color: var(--color-muted-foreground); transition: border-color .15s, box-shadow .15s; }
  .search:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .search .material-symbols-outlined { font-size: 16px; }
  .search input { border: 0; outline: 0; background: transparent; font: inherit; font-weight: 500; color: var(--color-foreground); width: 190px; }
  .segmented { display: inline-flex; align-items: center; gap: 2px; border: 1px solid var(--color-border); background: var(--color-card); border-radius: 8px; padding: 3px; }
  .segmented .label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--color-muted-foreground); padding: 0 6px; }
  .chip { border: 0; background: transparent; cursor: pointer; font-family: inherit; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--color-muted-foreground); padding: 5px 10px; border-radius: 6px; transition: background .15s, color .15s; }
  .chip.on { background: var(--primary-soft); color: var(--primary); }
  .chip:hover:not(.on) { color: var(--color-foreground); }
  .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 6px 13px; font-family: inherit; font-size: 11px; font-weight: 700; border: 1px solid var(--color-border); background: var(--color-card); color: var(--color-foreground); cursor: pointer; transition: border-color .15s, background .15s; }
  .btn:hover { border-color: var(--primary); }
  .btn .material-symbols-outlined { font-size: 15px; color: var(--color-muted-foreground); }
  .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  .btn-primary .material-symbols-outlined { color: rgba(255,255,255,.85); }
  .btn-primary:hover { background: #0a1478; }
  .btn-cta { background: var(--secondary); border-color: var(--secondary); color: #202d09; }
  .btn-cta .material-symbols-outlined { color: #202d09; }

  /* ── Corps : liste groupée + panneau ── */
  .app-body { flex: 1; display: flex; overflow: hidden; }
  .list-wrap { flex: 1; overflow: auto; padding: 14px 20px 30px 28px; }

  .group { margin-bottom: 14px; background: var(--color-card); border: 1px solid var(--color-rule); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(18,20,44,.05); }
  .group-head {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; cursor: pointer; user-select: none;
    border-left: 4px solid var(--gc);
    background: color-mix(in srgb, var(--gc) 5%, #fff);
  }
  .group-head .material-symbols-outlined.chev { font-size: 18px; color: var(--color-muted-foreground); transition: transform .15s; }
  .group.closed .chev { transform: rotate(-90deg); }
  .group-head .t { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--gc); }
  .group-head .n { font-family: var(--font-fraunces); font-size: 18px; font-weight: 900; color: var(--gc); }
  .group-head .d { font-size: 11px; font-weight: 500; color: var(--color-muted-foreground); }
  .group.closed .rows { display: none; }

  .row {
    display: grid; grid-template-columns: 165px 1fr 52px 84px 64px 190px; gap: 12px; align-items: center;
    padding: 10px 16px 10px 20px; border-top: 1px solid var(--color-rule-soft);
    cursor: pointer; transition: background .12s;
  }
  .row:hover { background: var(--primary-soft); }
  .row.sel { background: var(--primary-soft); box-shadow: inset 3px 0 var(--primary); }
  .r-main { font-size: 13px; font-weight: 700; letter-spacing: -.01em; }
  .r-main .ref2 { font-weight: 500; color: var(--color-muted-foreground); }
  .r-sub { margin-top: 1px; font-size: 11px; font-weight: 500; color: var(--gray); }
  .r-art { color: var(--primary); font-weight: 700; font-size: 12.5px; }
  .type-tag { display: inline-block; background: var(--primary-soft); color: var(--primary); border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 700; letter-spacing: .05em; justify-self: start; }
  .r-qty { text-align: right; white-space: nowrap; }
  .r-qty b { font-family: var(--font-fraunces); font-size: 18px; font-weight: 900; letter-spacing: -.02em; }
  .r-qty span { font-size: 10px; color: var(--color-muted-foreground); margin-left: 2px; }
  .r-date { font-weight: 700; font-size: 12px; font-variant-numeric: tabular-nums; }
  .r-date.late { color: var(--danger); font-weight: 800; }
  .r-flags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; }
  .fl { display: inline-flex; align-items: center; gap: 3px; border-radius: 999px; padding: 2px 8px; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap; }
  .fl .material-symbols-outlined { font-size: 12px; }
  .fl-cause { background: rgba(220,53,69,.1); color: var(--danger); }
  .fl-cq { background: rgba(23,162,184,.12); color: var(--info); }
  .fl-att { background: rgba(255,193,7,.18); color: var(--warning); }
  .fl-ok { background: rgba(40,167,69,.12); color: var(--success); }
  .fl-alloc { background: rgba(255,193,7,.18); color: var(--warning); }
  .fl-neutral { background: var(--color-muted); color: var(--color-muted-foreground); }

  /* ── Panneau diagnostic ── */
  .sheet { width: 400px; flex: none; border-left: 1px solid var(--color-rule); background: var(--color-card); overflow-y: auto; display: flex; flex-direction: column; }
  .sheet-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--color-muted-foreground); font-size: 12px; font-weight: 500; padding: 40px; text-align: center; }
  .sheet-empty .material-symbols-outlined { font-size: 36px; opacity: .4; }
  .sheet-head { padding: 18px 20px 14px; background: var(--primary); color: #fff; }
  .sheet-head .top { display: flex; align-items: flex-start; justify-content: space-between; }
  .sheet-head .num { font-family: var(--font-fraunces); font-size: 21px; font-weight: 700; }
  .sheet-head .close { opacity: .7; cursor: pointer; font-size: 20px; }
  .sheet-head .ref { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.75); margin-top: 2px; }
  .sheet-badges { display: flex; gap: 6px; margin-top: 10px; }
  .sheet-status { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; background: rgba(255,255,255,.15); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
  .sheet-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sd, var(--secondary)); }
  .sheet-body { padding: 16px 20px 24px; display: flex; flex-direction: column; gap: 18px; }
  .s-h { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--color-muted-foreground); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .s-h .material-symbols-outlined { font-size: 14px; }
  .kv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
  .kv .k { font-size: 10px; font-weight: 600; color: var(--color-muted-foreground); }
  .kv .v { font-size: 13px; font-weight: 700; margin-top: 2px; }
  .kv .v.disp { font-family: var(--font-fraunces); font-size: 16px; }
  .kv .v.late { color: var(--danger); }

  /* Frise cause (chaîne rétro) */
  .chain { position: relative; padding-left: 22px; display: flex; flex-direction: column; gap: 14px; }
  .chain::before { content: ""; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: var(--color-rule); }
  .step { position: relative; }
  .step .pt { position: absolute; left: -21px; top: 2px; width: 12px; height: 12px; border-radius: 50%; border: 3px solid var(--color-card); background: var(--pc, var(--gray)); box-shadow: 0 0 0 1px var(--color-rule); }
  .step .st-t { font-size: 12px; font-weight: 700; }
  .step .st-d { font-size: 11px; font-weight: 500; color: var(--color-muted-foreground); margin-top: 1px; line-height: 1.45; }
  .step .st-d b { color: var(--danger); font-weight: 800; }
  .step .eta-pill { display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; border-radius: 5px; padding: 2px 8px; background: rgba(23,162,184,.1); color: var(--info); font-size: 10.5px; font-weight: 700; }
  .step .eta-pill.overdue { background: rgba(220,53,69,.1); color: var(--danger); }
  .step .eta-pill .material-symbols-outlined { font-size: 13px; }

  .emp-pill { display: flex; align-items: center; justify-content: space-between; gap: 6px; border: 1px solid var(--color-border); border-radius: 6px; padding: 6px 10px; font-size: 11.5px; font-weight: 600; margin-bottom: 5px; }
  .emp-pill.alloc { border-color: rgba(40,167,69,.35); background: rgba(40,167,69,.07); color: #1d7a33; }
  .emp-pill .nm { display: flex; align-items: center; gap: 6px; }
  .emp-pill .material-symbols-outlined { font-size: 14px; }
  .emp-pill .q { font-weight: 800; font-variant-numeric: tabular-nums; }
  .emp-pill .pal { background: var(--color-muted); border-radius: 3px; padding: 0 6px; font-size: 10px; font-weight: 700; color: var(--color-foreground); }

  .verdict-card { border: 1px solid var(--color-rule); border-radius: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; background: color-mix(in srgb, var(--vc) 4%, #fff); border-left: 4px solid var(--vc); }
  .verdict-card .v-top { display: flex; align-items: center; gap: 8px; }
  .verdict-card .v-lbl { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--vc); }
  .verdict-card .v-jr { margin-left: auto; font-family: var(--font-fraunces); font-size: 15px; font-weight: 900; color: var(--vc); }
  .of-line { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; }
  .of-tag { border-radius: 4px; padding: 1px 5px; font-size: 9px; font-weight: 800; letter-spacing: .04em; }
  .t-wof { background: rgba(40,167,69,.14); color: var(--success); }
  .t-wop { background: rgba(23,162,184,.14); color: var(--info); }
  .t-wos { background: rgba(255,193,7,.2); color: var(--warning); }
  .sheet-cta { display: flex; gap: 8px; }
  .sheet-cta .btn { flex: 1; justify-content: center; }
</style>
</head>

    st:'alc', reste:180, exp:'08/07', late:false, jrRetard:0, emp:[{nm:'MAG1', q:120, alloc:false},{nm:'MAG3', q:60, alloc:false}],

    actions:[{lbl:'Allouer 180 u', ic:'move_to_inbox', kind:'cta'}] },
  { n:'F24-08161', refC:'', client:'Brossette IdF', art:'BDH60-ESH10', des:'Bouche hygro SDB ESH10', type:'MTS', at:'BDH', atL:'Montage BDH',
    st:'alc', reste:90, exp:'06/07', late:false, jrRetard:0, cq:true, emp:[{nm:'MAG2', q:90, alloc:false}],
    chain:[
      { t:'Stock disponible non alloué', d:'90 u en MAG2 — dont <b>30 u sous contrôle qualité</b>.', c:'var(--warning-bright)' },
      { t:'Signal CQ', d:'La couverture consomme du stock en attente de libération qualité.', c:'var(--info)' },
    ],
    verdict:{ k:'time', lbl:'À temps', jr:'à temps', c:'var(--success)', ofs:[{o:'OF240230',s:1}] },
    actions:[{lbl:'Allouer 60 u strictes', ic:'move_to_inbox', kind:'cta'},{lbl:'Statut CQ', ic:'science'}] },
  { n:'F24-08133', refC:'UK-20441', client:'Aereco UK Ltd', art:'BXC-BOOST', des:'Bouche extraction boost', type:'MTO', at:'BDH', atL:'Montage BDH',
    st:'exp', reste:240, exp:'03/07', late:false, jrRetard:0, emp:[{nm:'EXPE01', q:240, alloc:true, pal:'P240611'}],
    chain:[
      { t:'Prête à expédier', d:'240 u allouées, palette P240611 en zone d’expédition EXPE01.', c:'var(--success)' },
    ],
    verdict:{ k:'stock', lbl:'En stock', jr:'à temps', c:'var(--success)', ofs:[] },
    actions:[{lbl:'Bon d’expédition', ic:'local_shipping', kind:'primary'}] },
  { n:'F24-08141', refC:'', client:'SIDER Bordeaux', art:'KHY10-VMC', des:'Kit VMC hygro complet', type:'MTO', at:'KIT', atL:'Kits VMC',
    st:'exp', reste:12, exp:'03/07', late:false, jrRetard:0, att:true, emp:[{nm:'MAG1', q:12, alloc:true}],
    chain:[
      { t:'Ligne prête — commande incomplète', d:'MTO : expédition partielle non autorisée, 2 autres lignes de la commande en attente.', c:'var(--warning-bright)' },
    ],
    verdict:{ k:'time', lbl:'À temps', jr:'à temps', c:'var(--success)', ofs:[] },
    actions:[{lbl:'Voir la commande', ic:'visibility'}] },
  { n:'F24-08170', refC:'', client:'DSC Toulouse', art:'EAH30-GRS', des:'Entrée d’air hygro 30 gris', type:'MTS', at:'EAH', atL:'Entrées d’air',
    st:'exp', reste:150, exp:'02/07', late:false, jrRetard:0, emp:[{nm:'EXPE01', q:150, alloc:true, pal:'P240598'}],
    chain:[
      { t:'Prête à expédier', d:'150 u allouées, palette P240598 en zone EXPE01.', c:'var(--success)' },
    ],
    verdict:{ k:'stock', lbl:'En stock', jr:'à temps', c:'var(--success)', ofs:[] },
    actions:[{lbl:'Bon d’expédition', ic:'local_shipping', kind:'primary'}] },
  { n:'F24-08188', refC:'', client:'Yesss Électrique', art:'VAM-T3', des:'Ventilateur VAM T3', type:'NOR', at:'VAM', atL:'Ventilateurs',
    st:'ras', reste:20, exp:'11/07', late:false, jrRetard:0, emp:[],
    chain:[{ t:'Sous contrôle', d:'OF240244 (WOS) couvre le besoin dans les temps.', c:'var(--gray)' }],
    verdict:{ k:'time', lbl:'À temps', jr:'à temps', c:'var(--success)', ofs:[{o:'OF240244',s:3}] }, actions:[] },
  { n:'F24-08192', refC:'', client:'CGED Strasbourg', art:'BDH60-ESH60', des:'Bouche hygro WC ESH60', type:'MTS', at:'BDH', atL:'Montage BDH',
    st:'ras', reste:60, exp:'15/07', late:false, jrRetard:0, emp:[],
    chain:[{ t:'Sous contrôle', d:'Couverture stock projetée suffisante à date.', c:'var(--gray)' }],
    verdict:{ k:'stock', lbl:'En stock', jr:'à temps', c:'var(--success)', ofs:[] }, actions:[] },
];

const GROUPS = [
  { k:'ret', t:'Retard', d:'date expé dépassée — agir maintenant', c:'var(--danger)', open:true },
  { k:'alc', t:'Allocation à faire', d:'stock disponible, un clic pour réserver', c:'var(--warning-bright)', open:true },
  { k:'exp', t:'À expédier', d:'allouées, prêtes au départ', c:'var(--success)', open:true },
  { k:'ras', t:'RAS', d:'sous contrôle', c:'var(--gray)', open:false },
];
const OFT = { 1:['WOF','t-wof'], 2:['WOP','t-wop'], 3:['WOS','t-wos'] };

const S = { q:'', types:new Set(['MTS','MTO','NOR']), at:new Set(), sel:null, closed:new Set(['ras']) };

function flags(r) {
  const out = [];
  if (r.st==='ret' && r.chain.length) out.push(`<span class="fl fl-cause"><span class="material-symbols-outlined">error</span>${r.verdict.lbl==='Sans couverture'?'Sans couverture':r.chain[r.chain.length-1].t.split(' — ')[0].slice(0,22)}</span>`);
  if (r.st==='alc') out.push(`<span class="fl fl-alloc"><span class="material-symbols-outlined">move_to_inbox</span>${r.emp.reduce((s,e)=>s+e.q,0)} u dispo</span>`);
  if (r.st==='exp') out.push(`<span class="fl fl-ok"><span class="material-symbols-outlined">local_shipping</span>${r.emp[0]?.pal ?? 'zone expé'}</span>`);
  if (r.cq) out.push('<span class="fl fl-cq"><span class="material-symbols-outlined">science</span>CQ</span>');
  if (r.att) out.push('<span class="fl fl-att"><span class="material-symbols-outlined">pending</span>Attente lignes</span>');
  if (r.st==='ras') out.push('<span class="fl fl-neutral">OK</span>');
  return out.join('');
}

function renderGroups() {
  const q = S.q.toLowerCase();
  const vis = ROWS.filter(r => S.types.has(r.type) && (S.at.size===0 || S.at.has(r.at)) &&
    (!q || (r.n+r.client+r.art+r.des).toLowerCase().includes(q)));
  document.getElementById('groups').innerHTML = GROUPS.map(g => {
    const rows = vis.filter(r=>r.st===g.k);
    return `<div class="group ${S.closed.has(g.k)?'closed':''}" style="--gc:${g.c}">
      <div class="group-head" data-g="${g.k}">
        <span class="material-symbols-outlined chev">expand_more</span>
        <span class="t">${g.t}</span><span class="n">${rows.length}</span><span class="d">${g.d}</span>
      </div>
      <div class="rows">${rows.map(r => `
        <div class="row ${S.sel===r.n?'sel':''}" data-n="${r.n}">
          <div><div class="r-main">${r.n}${r.refC?`<span class="ref2">/${r.refC}</span>`:''}</div><div class="r-sub">${r.client}</div></div>
          <div><div class="r-art">${r.art}</div><div class="r-sub">${r.des}</div></div>
          <span class="type-tag">${r.type}</span>
          <div class="r-qty"><b>${r.reste}</b><span>u</span></div>
          <div class="r-date ${r.late?'late':''}">${r.exp}</div>
          <div class="r-flags">${flags(r)}</div>
        </div>`).join('')}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.group-head').forEach(h => h.onclick = () => {
    const k = h.dataset.g; S.closed.has(k) ? S.closed.delete(k) : S.closed.add(k); renderGroups(); });
  document.querySelectorAll('.row').forEach(el => el.onclick = () => { S.sel = el.dataset.n; renderGroups(); renderSheet(); });
}

function renderSheet() {
  const sheet = document.getElementById('sheet');
  const r = ROWS.find(x=>x.n===S.sel);
  if (!r) return;
  const stLbl = { ret:'Retard', alc:'Allocation à faire', exp:'À expédier', ras:'RAS' }[r.st];
  const stCol = { ret:'var(--danger)', alc:'var(--warning-bright)', exp:'var(--secondary)', ras:'rgba(255,255,255,.6)' }[r.st];
  sheet.innerHTML = `
    <div class="sheet-head">
      <div class="top"><div class="num">${r.n}</div><span class="close material-symbols-outlined" id="close">close</span></div>
      <div class="ref">${r.client} · ${r.art} — ${r.des}</div>
      <div class="sheet-badges"><span class="sheet-status" style="--sd:${stCol}"><span class="dot"></span>${stLbl}</span>
      ${r.cq?'<span class="sheet-status"><span class="dot" style="background:#7ce0f0"></span>CQ</span>':''}</div>
    </div>
    <div class="sheet-body">
      <div>
        <div class="s-h"><span class="material-symbols-outlined">info</span>Informations</div>
        <div class="kv-grid">
          <div class="kv"><div class="k">Reste à livrer</div><div class="v disp">${r.reste} u</div></div>
          <div class="kv"><div class="k">Date expédition</div><div class="v disp ${r.late?'late':''}">${r.exp}${r.late?` · J+${r.jrRetard}`:''}</div></div>
          <div class="kv"><div class="k">Type</div><div class="v">${r.type}</div></div>
          <div class="kv"><div class="k">Atelier</div><div class="v">${r.atL}</div></div>
        </div>
      </div>
      <div>
        <div class="s-h"><span class="material-symbols-outlined">account_tree</span>Diagnostic — pourquoi ce statut</div>
        <div class="chain">${r.chain.map(s => `
          <div class="step" style="--pc:${s.c}"><span class="pt"></span>
            <div class="st-t">${s.t}</div>
            <div class="st-d">${s.d}</div>
            ${s.eta?`<span class="eta-pill ${s.eta.overdue?'overdue':''}"><span class="material-symbols-outlined">local_shipping</span>${s.eta.txt}</span>`:''}
          </div>`).join('')}</div>
      </div>
      ${r.emp.length?`<div>
        <div class="s-h"><span class="material-symbols-outlined">warehouse</span>Emplacements</div>
        ${r.emp.map(e=>`<div class="emp-pill ${e.alloc?'alloc':''}">
          <span class="nm"><span class="material-symbols-outlined">${e.alloc?'check_circle':'radio_button_unchecked'}</span><b>${e.nm}</b>${e.alloc?' · alloué':' · stock libre'}</span>
          <span class="nm">${e.pal?`<span class="pal">${e.pal}</span>`:''}<span class="q">${e.q} u</span></span>
        </div>`).join('')}</div>`:''}
      <div>
        <div class="s-h"><span class="material-symbols-outlined">query_stats</span>Projection (moteur séquentiel)</div>
        <div class="verdict-card" style="--vc:${r.verdict.c}">
          <div class="v-top"><span class="v-lbl">${r.verdict.lbl}</span><span class="v-jr">${r.verdict.jr}</span></div>
          ${r.verdict.ofs.length?r.verdict.ofs.map(o=>`<div class="of-line">${o.o}<span class="of-tag ${OFT[o.s][1]}">${OFT[o.s][0]}</span></div>`).join(''):'<div class="of-line" style="color:var(--color-muted-foreground)">couverture stock / achat</div>'}
        </div>
      </div>
      ${r.actions.length?`<div class="sheet-cta">${r.actions.map(a=>`
        <button class="btn ${a.kind==='primary'?'btn-primary':a.kind==='cta'?'btn-cta':''}">
          <span class="material-symbols-outlined">${a.ic}</span>${a.lbl}</button>`).join('')}</div>`:''}
    </div>`;
  document.getElementById('close').onclick = () => { S.sel = null;
    sheet.innerHTML = '<div class="sheet-empty"><span class="material-symbols-outlined">left_click</span>Sélectionner une ligne pour ouvrir<br />le diagnostic complet de la commande.</div>';
    renderGroups(); };
}

document.querySelectorAll('#types .chip').forEach(b => b.onclick = () => {
  b.classList.toggle('on'); S.types.has(b.dataset.t) ? S.types.delete(b.dataset.t) : S.types.add(b.dataset.t); renderGroups(); });
document.querySelectorAll('#ateliers .chip').forEach(b => b.onclick = () => {
  b.classList.toggle('on'); S.at.has(b.dataset.a) ? S.at.delete(b.dataset.a) : S.at.add(b.dataset.a); renderGroups(); });
document.getElementById('q').oninput = (e) => { S.q = e.target.value; renderGroups(); };

renderGroups();
/* Pré-sélection pour la démo : première ligne en retard. */
S.sel = 'F24-08112'; renderGroups(); renderSheet();
</script>
</body>
