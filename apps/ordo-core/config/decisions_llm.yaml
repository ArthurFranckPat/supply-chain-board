# config/decisions_llm.yaml
# Configuration du système de décision basé sur LLM

# Provider LLM à utiliser
llm_provider:
  # Provider : "mistral", "anthropic", "openai", "mock"
  name: "mock"
  # API key (sera lu depuis les variables d'environnement si non spécifié)
  api_key: null
  # Modèle à utiliser (dépend du provider)
  model: null
  # Température pour la génération (0.0 = déterministe, 1.0 = créatif)
  temperature: 0.3
  # Nombre maximal de tokens pour la réponse
  max_tokens: 2000

# Mapping provider → modèle
models:
  mistral:
    default: "mistral-large-latest"
    alternatives:
      - "mistral-medium-latest"
      - "mistral-small-latest"
  anthropic:
    default: "claude-3-5-sonnet-20241022"
    alternatives:
      - "claude-3-5-haiku-20241022"
  openai:
    default: "gpt-4o"
    alternatives:
      - "gpt-4o-mini"
  mock:
    default: "mock"
    alternatives: []

# Configuration du retry
retry:
  # Nombre de tentatives en cas d'erreur API
  max_retries: 3
  # Délai entre les tentatives (en secondes)
  retry_delay: 1.0
  # Délai max entre les tentatives (en secondes)
  max_retry_delay: 10.0

# Configuration du contexte LLM
context:
  # Niveau de détail du prompt : "low", "medium", "high"
  detail_level: "high"
  # Langue de la réponse : "fr", "en"
  language: "fr"
  # Inclure les commandes non allouées dans l'analyse
  include_unallocated: true

# Configuration de l'analyse des composants
analysis:
  # Seuil de ratio de couverture pour considérer un composant comme critique
  critical_ratio_threshold: 0.8
  # Seuil de ratio de couverture pour considérer un composant comme très critique
  very_critical_ratio_threshold: 0.5
  # Inclure les composants fabriqués dans l'analyse récursive
  recursive_analysis: true
  # Profondeur maximale de l'analyse récursive (-1 = illimité)
  max_recursion_depth: -1

# Configuration du fallback
fallback:
  # Utiliser des décisions de fallback en cas d'erreur LLM
  enabled: true
  # Type de fallback : "conservative", "balanced", "aggressive"
  strategy: "conservative"
  # Message par défaut pour les décisions de fallback
  default_message: "Erreur lors de l'évaluation automatique"

# Configuration de la validation des décisions
validation:
  # Score de confiance minimum pour accepter une décision LLM
  min_confidence: 0.5
  # Valider la cohérence des champs (ex: DEFER avec defer_date)
  check_coherence: true
  # Longueur maximale de la raison (caractères)
  max_reason_length: 500

# Configuration de la persistance
persistence:
  # Persister les décisions LLM
  enabled: true
  # Chemin vers le fichier de persistance
  file_path: "data/decisions_llm_history.json"
  # Nombre maximal d'entrées
  max_entries: 10000
  # Inclure les prompts et réponses LLM bruts (pour debugging)
  include_raw_llm_data: false

# Configuration du logging
logging:
  # Niveau de logging pour le module LLM : "DEBUG", "INFO", "WARNING", "ERROR"
  level: "INFO"
  # Logger les prompts envoyés au LLM
  log_prompts: true
  # Logger les réponses brutes du LLM
  log_responses: true
  # Logger les décisions parsées
  log_parsed_decisions: true
