<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Suivi — le même tableau, UI soignée</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap"

     tracking.tsx (N°, Commande·Client, Article·Désignation, Type,
     Reste, Expé, Emplacement, Statut, Cause du retard).
     Seule l'exécution change :
     - header en petites capitales avec tri visible, fond légèrement
       teinté, double filet marine
     - rythme vertical strict (padding 14px, interlignes homogènes)
     - 3 niveaux typo par cellule max : ink 13/700 → corps 12/500 →
       méta 10.5/600 gris
     - badges statut : pastille pleine douce + icône, UN seul rayon
     - pills emplacement redessinées : icône état, palette en cartouche,
       qté tabulaire alignée
     - cause : label net + détails hiérarchisés (manquants rouge,
       ETA cyan avec icône camion, rétro gris)
     - lignes en retard : fond teinté + liseré 3px + date rouge forte
     - survol : élévation douce, zebra très léger ailleurs
     ──────────────────────────────────────────────────────────── */
      :root {
        --primary: #081061;
        --primary-soft: rgba(8, 16, 97, 0.06);
        --secondary: #b0d138;
        --success: #28a745;
        --info: #17a2b8;
        --warning: #9a7209;
        --warning-bright: #ffc107;
        --danger: #dc3545;
        --light: #f0f0ed;
        --gray: #6c757d;
        --color-background: var(--light);
        --color-foreground: #12142c;
        --color-card: #ffffff;
        --color-muted: #e7e5de;
        --color-muted-foreground: var(--gray);
        --color-border: #d9d6cb;
        --color-rule: #d9d6cb;
        --color-rule-soft: #ecebe4;
        --font-fraunces: 'Fraunces', Georgia, serif;
        --font-sans: 'Inter', system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--color-background);
        color: var(--color-foreground);
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        line-height: 1;
        display: inline-block;
        vertical-align: middle;
      }

      header.bar {
        flex: none;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 28px;
        background: var(--color-card);
        border-bottom: 1px solid var(--color-rule);
      }
      .wordmark {
        font-family: var(--font-fraunces);
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -0.01em;
      }
      .wordmark em {
        font-style: italic;
        font-weight: 500;
        color: var(--primary);
      }
      .subtitle {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--color-muted-foreground);
      }
      .bar .meta {
        margin-left: auto;
        font-size: 11px;
        font-weight: 500;
        color: var(--color-muted-foreground);
      }
      .bar .meta b {
        color: var(--color-foreground);
        font-weight: 700;
      }
      .bar .meta .week {
        font-family: var(--font-fraunces);
        font-weight: 700;
        font-size: 12px;
        color: var(--primary);
        text-transform: capitalize;
      }

      .table-zone {
        flex: 1;
        overflow: hidden;
        padding: 16px 28px 20px;
        display: flex;
        flex-direction: column;
      }
      .table-card {
        flex: 1;
        overflow: auto;
        background: var(--color-card);
        border: 1px solid var(--color-rule);
        border-radius: 12px;
        box-shadow:
          0 1px 2px rgba(18, 20, 44, 0.04),
          0 4px 16px rgba(18, 20, 44, 0.05);
      }
      table {
        width: 100%;
        min-width: 1340px;
        border-collapse: separate;
        border-spacing: 0;
        table-layout: fixed;
      }

      /* ── Header ── */
      thead th {
        position: sticky;
        top: 0;
        z-index: 3;
        background: #f7f6f2;
        padding: 0 16px;
        height: 40px;
        vertical-align: middle;
        text-align: left;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #4a4c66;
        border-bottom: 2px solid var(--primary);
        box-shadow: inset 0 -3px 0 rgba(8, 16, 97, 0.08);
        white-space: nowrap;
      }
      thead th.num {
        text-align: right;
      }
      thead th .sort {
        font-size: 13px;
        color: var(--primary);
        vertical-align: -2px;
        margin-left: 2px;
      }
      thead th:first-child {
        border-top-left-radius: 12px;
      }
      thead th:last-child {
        border-top-right-radius: 12px;
      }

      /* ── Rangées ── */
      tbody td {
        padding: 14px 16px;
        vertical-align: middle;
        font-size: 12px;
        border-bottom: 1px solid var(--color-rule-soft);
      }
      tbody tr {
        transition:
          background 0.12s,
          box-shadow 0.12s;
      }
      tbody tr:nth-child(even) td {
        background: #fcfbf9;
      }
      tbody tr:hover td {
        background: var(--primary-soft);
      }
      tbody tr.late td {
        background: #fdf3f4;
      }
      tbody tr.late:hover td {
        background: #fae8ea;
      }
      tbody tr:last-child td {
        border-bottom: 0;
      }

      /* N° + liseré retard */
      td.idx {
        font-family: var(--font-fraunces);
        font-size: 13px;
        font-weight: 600;
        color: #a5a08f;
        text-align: right;
        padding-right: 10px;
      }
      tr.late td.idx {
        box-shadow: inset 3px 0 var(--danger);
        color: var(--danger);
      }

      /* Commande · Client */
      .lead {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: -0.01em;
        line-height: 1.25;
      }
      .lead .ref2 {
        font-weight: 500;
        color: #9b9687;
      }
      .sub {
        margin-top: 3px;
        font-size: 11.5px;
        font-weight: 500;
        color: var(--gray);
        line-height: 1.35;
      }

      /* Article */
      .art-l {
        font-size: 13px;
        font-weight: 700;
        color: var(--primary);
        letter-spacing: -0.005em;
      }
      .art-l .ref2 {
        font-weight: 500;
        color: #9b9687;
      }

      /* Type */
      .type-tag {
        display: inline-flex;
        align-items: center;
        height: 20px;
        padding: 0 8px;
        background: var(--primary-soft);
        color: var(--primary);
        border: 1px solid rgba(8, 16, 97, 0.14);
        border-radius: 5px;
        font-size: 9.5px;
        font-weight: 800;
        letter-spacing: 0.07em;
      }

      /* Reste */
      td.qty {
        text-align: right;
        white-space: nowrap;
      }
      .qv {
        font-family: var(--font-fraunces);
        font-size: 20px;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .qu {
        font-size: 10px;
        font-weight: 600;
        color: #a5a08f;
        margin-left: 3px;
      }

      /* Expé */
      td.date {
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
        font-size: 12.5px;
        font-weight: 600;
      }
      td.date .d-late {
        color: var(--danger);
        font-weight: 800;
      }
      td.date .d-jr {
        display: block;
        margin-top: 2px;
        font-size: 9.5px;
        font-weight: 800;
        letter-spacing: 0.05em;
        color: var(--danger);
        text-transform: uppercase;
      }

      /* Emplacement */
      .emp {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .emp-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 24px;
        padding: 0 8px 0 6px;
        border: 1px solid var(--color-rule);
        border-radius: 6px;
        background: var(--color-card);
        font-size: 11px;
        font-weight: 600;
        color: var(--gray);
      }
      .emp-pill .material-symbols-outlined {
        font-size: 13px;
        color: #b3ad9c;
      }
      .emp-pill .nm {
        font-weight: 800;
        color: var(--color-foreground);
        letter-spacing: 0.02em;
      }
      .emp-pill .pal {
        margin-left: auto;
        background: var(--color-muted);
        border-radius: 4px;
        padding: 1px 6px;
        font-size: 9.5px;
        font-weight: 700;
        color: #55503f;
      }
      .emp-pill .q {
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: var(--color-foreground);
      }
      .emp-pill .pal + .q {
        margin-left: 0;
      }
      .emp-pill .q:last-child {
        margin-left: auto;
      }
      .emp-pill .pal ~ .q {
        margin-left: 4px;
      }
      .emp-pill.alloc {
        border-color: rgba(40, 167, 69, 0.35);
        background: #f2f9f3;
        color: #2e7d3f;
      }
      .emp-pill.alloc .material-symbols-outlined {
        color: var(--success);
      }
      .emp-pill.alloc .nm,
      .emp-pill.alloc .q {
        color: #1d6630;
      }

      /* Statut */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
        height: 22px;
        padding: 0 9px;
        border-radius: 6px;
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 0.02em;
        border: 1px solid transparent;
      }
      .badge .material-symbols-outlined {
        font-size: 13px;
      }
      .b-exp {
        background: #eef8f0;
        color: #1d7a33;
        border-color: rgba(40, 167, 69, 0.25);
      }
      .b-alc {
        background: #fdf7e7;
        color: var(--warning);
        border-color: rgba(184, 134, 11, 0.25);
      }
      .b-ret {
        background: #fdeef0;
        color: var(--danger);
        border-color: rgba(220, 53, 69, 0.22);
      }
      .b-ras {
        background: #f3f2ec;
        color: var(--gray);
        border-color: var(--color-rule);
      }
      .b-cq {
        background: #ecf7f9;
        color: #0f7f91;
        border-color: rgba(23, 162, 184, 0.28);
      }
      .badge-stack {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      /* Cause du retard */
      .cause-l {
        font-size: 12px;
        font-weight: 600;
        line-height: 1.4;
        color: #2c2e48;
      }
      .cause-comps {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-top: 5px;
        height: 20px;
        padding: 0 8px;
        background: #fdeef0;
        border: 1px solid rgba(220, 53, 69, 0.2);
        border-radius: 5px;
        font-size: 10.5px;
        font-weight: 800;
        color: var(--danger);
        font-variant-numeric: tabular-nums;
      }
      .cause-eta {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 4px;
        font-size: 10.5px;
        font-weight: 700;
        color: #0f7f91;
      }
      .cause-eta .material-symbols-outlined {
        font-size: 13px;
      }
      .cause-retro {
        margin-top: 3px;
        font-size: 10.5px;
        font-weight: 500;
        color: #8d8878;
        line-height: 1.4;
      }
      .dash {
        color: #b3ad9c;
      }

      .foot {
        flex: none;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 8px 28px;
        border-top: 1px solid var(--color-rule);
        background: var(--color-card);
        font-size: 11px;
        font-weight: 600;
        color: var(--color-muted-foreground);
      }
      .foot b {
        color: var(--color-foreground);
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <div class="wordmark">Supply Chain <em>AERECO</em></div>

      <div class="meta">

            )
            .join('')}</div>`
        : '<span class="dash">—</span>'
    }</td>
    <td><div class="badge-stack">
      <span class="badge ${st.cls}"><span class="material-symbols-outlined">${st.ic}</span>${st.lbl}</span>
      ${r.cq ? '<span class="badge b-cq"><span class="material-symbols-outlined">science</span>CQ</span>' : ''}
      ${r.att ? '<span class="badge b-alc"><span class="material-symbols-outlined">pending</span>Attente lignes</span>' : ''}
    </div></td>
    <td>${
      r.cause
        ? `
      <div class="cause-l">${r.cause.l}</div>
      ${r.cause.comps.length ? `<span class="cause-comps">${r.cause.comps.join(' · ')}</span>` : ''}
      ${r.cause.eta ? `<div class="cause-eta"><span class="material-symbols-outlined">local_shipping</span>${r.cause.eta}</div>` : ''}
      ${r.cause.retro ? `<div class="cause-retro">${r.cause.retro}</div>` : ''}`
        : '<span class="dash">—</span>'
    }</td>
  </tr>`
      }).join('')
    </script>
  </body>
</html>
