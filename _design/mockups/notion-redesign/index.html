<script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
<style>
  /* ══════════════════════════════════════════════════════════════
     Notion-inspired base
     ══════════════════════════════════════════════════════════════ */
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-page: #f7f6f3;
    --bg-card: #ffffff;
    --bg-sidebar: #f7f6f3;
    --bg-hover: #efefec;
    --bg-active: #e8e7e4;
    --text-primary: #1d1c1a;
    --text-secondary: #6b6b67;
    --text-tertiary: #9c9c98;
    --text-disable: #c1c0bd;
    --border-light: #e9e8e6;
    --border-strong: #d3d1cb;
    --accent: #0069b4;
    --accent-soft: #e8f0fe;
    --green: #2b825b;
    --green-soft: #e8f5ef;
    --amber: #a06f0c;
    --amber-soft: #faf1db;
    --red: #c7303a;
    --red-soft: #fce8e9;
    --orange: #b45508;
    --orange-soft: #fef0e6;
    --blue: #0069b4;
    --blue-soft: #e8f0fe;
    --purple: #6940a5;
    --purple-soft: #f0eaf9;
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --shadow-card: 0 1px 3px -1px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.02);
    --shadow-pop: 0 2px 8px -2px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.03);
    --font: 'Inter', -apple-system, system-ui, sans-serif;
  }
  body {
    font-family: var(--font);
    background: var(--bg-page);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Section labels */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 32px 48px 16px;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 24px;
  }
  .section-header h2 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text-primary);
  }
  .section-header .badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    background: var(--bg-hover);
    padding: 2px 8px;
    border-radius: 999px;
  }
  .section-header .arrow {
    font-size: 14px;
    color: var(--text-tertiary);
    padding: 0 4px;
  }
  .section-desc {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 0 48px 24px;
    max-width: 720px;
    line-height: 1.5;
  }

  /* Side-by-side comparison */
  .comparison {
    display: grid;
    grid-template-columns: 1fr 48px 1fr;
    gap: 0;
    padding: 0 48px 48px;
    align-items: start;
  }
  .comparison-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    margin-bottom: 12px;
  }
  .comparison-vs {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 60px;
    font-size: 14px;
    color: var(--text-tertiary);
    font-weight: 500;
  }
  .mockup-box {
    position: relative;
    overflow: hidden;
  }

  /* Notion shared styles */
  .notion-page {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 96px;
  }
  .n-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-primary);
  }
  .n-text-sm {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .n-text-xs {
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .n-h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .n-h2 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .n-h3 {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
  }

  /* Notion property tags */
  .n-prop {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    line-height: 1;
  }
  .n-prop-name {
    color: var(--text-tertiary);
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .n-prop-val {
    color: var(--text-primary);
    font-weight: 500;
  }

  /* Select tag (like Notion select property) */
  .n-select {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 0 6px;
    height: 20px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .n-select-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex: none;
  }
  .n-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }

  /* Notion button */
  .n-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    height: 28px;
    padding: 0 8px;
    border: none;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-family: var(--font);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.1s;
  }
  .n-btn:hover {
    background: var(--bg-hover);
  }
  .n-btn-icon {
    width: 28px;
    padding: 0;
    justify-content: center;
  }

  /* Notion chip / status */
  .n-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    height: 22px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Hover controls */
