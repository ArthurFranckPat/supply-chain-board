<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Suivi — V1 « Registre Navy »</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ════════════════════════════════════════════════════════════
     V1 « Registre Navy » — le registre actuel transposé Navy, avec
     une simplification UX : les tuiles KPI SONT les filtres de statut
     (clic = filtre), la rangée de chips statut disparaît.
     Tokens : theme-aereco-navy.html (marine #081061, lime CTA, cyan info).
     ──────────────────────────────────────────────────────────── */
      :root {
        --primary: #081061;
        --primary-soft: rgba(8, 16, 97, 0.07);
        --secondary: #b0d138;
        --success: #28a745;
        --info: #17a2b8;
        --warning: #b8860b;
        --warning-bright: #ffc107;
        --danger: #dc3545;
        --light: #f0f0ed;
        --gray: #6c757d;

        --color-background: var(--light);
        --color-foreground: #12142c;
        --color-card: #ffffff;
        --color-muted: #e7e5de;
        --color-muted-foreground: var(--gray);
        --color-border: #d9d6cb;
        --color-rule: #d9d6cb;
        --color-rule-soft: #eae8e0;

        --font-fraunces: 'Fraunces', Georgia, serif;
        --font-sans: 'Inter', system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--color-background);
        color: var(--color-foreground);
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        line-height: 1;
        display: inline-block;
        vertical-align: middle;
      }

      /* ── Masthead ── */
      header.masthead {
        flex: none;
        background: var(--color-card);
        border-bottom: 1px solid var(--color-rule);
      }
      .masthead-top {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        padding: 13px 28px 8px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .wordmark {
        font-family: var(--font-fraunces);
        font-size: 24px;
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: -0.01em;
      }
      .wordmark em {
        font-style: italic;
        font-weight: 500;
        color: var(--primary);
      }
      .subtitle {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--color-muted-foreground);
        padding-bottom: 2px;
      }
      .env-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 1px solid var(--color-border);
        background: var(--color-muted);
        color: var(--color-muted-foreground);
        border-radius: 999px;
        padding: 3px 9px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .env-pill .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
      }
      .meta {
        text-align: right;
        font-size: 11px;
        font-weight: 500;
        line-height: 1.6;
        color: var(--color-muted-foreground);
      }
      .meta b {
        color: var(--color-foreground);
        font-weight: 700;
      }
      .meta .week {
        font-family: var(--font-fraunces);
        font-weight: 700;
        font-size: 12px;
        color: var(--primary);
        text-transform: capitalize;
      }
      nav.tabs {
        display: flex;
        align-items: center;
        gap: 4px;
        border-top: 1px solid var(--color-rule-soft);
        padding: 0 28px;
        min-height: 42px;
      }
      nav.tabs a {
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
        color: var(--color-muted-foreground);
        padding: 11px 14px 9px;
        border-bottom: 2px solid transparent;
        transition:
          color 0.15s,
          border-color 0.15s;
      }
      nav.tabs a:hover {
        color: var(--primary);
      }
      nav.tabs a.active {
        color: var(--primary);
        border-color: var(--primary);
      }
      .user-chip {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 600;
      }
      .avatar {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--primary);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
      }

      /* ── Bandeau KPI = filtres ── */
      .kpis {
        flex: none;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        border-bottom: 1px solid var(--color-rule);
        background: var(--color-card);
      }
      .kpi {
        appearance: none;
        border: 0;
        background: transparent;
        cursor: pointer;
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding: 12px 22px 10px;
        border-right: 1px solid var(--color-rule-soft);
        border-bottom: 3px solid transparent;
        font-family: inherit;
        color: inherit;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .kpi:last-child {
        border-right: 0;
      }
      .kpi:hover {
        background: var(--primary-soft);
      }
      .kpi.on {
        border-bottom-color: var(--primary);
        background: var(--primary-soft);
      }
      .kpi .lbl {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--color-muted-foreground);
      }
      .kpi .lbl .sw {
        width: 8px;
        height: 8px;
        border-radius: 2px;
      }
      .kpi .val {
        font-family: var(--font-fraunces);
        font-size: 32px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.01em;
      }
      .kpi .sub {
        font-size: 10.5px;
        font-weight: 500;
        color: var(--color-muted-foreground);
      }
      .kpi .filter-hint {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--primary);
        opacity: 0;
        transition: opacity 0.15s;
      }
      .kpi:hover .filter-hint,
      .kpi.on .filter-hint {
        opacity: 0.8;
      }

      /* ── Toolbar ── */
      .toolbar {
        flex: none;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        padding: 9px 28px;
        border-bottom: 1px solid var(--color-rule);
      }
      .segmented {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        border: 1px solid var(--color-border);
        background: var(--color-card);
        border-radius: 8px;
        padding: 3px;
      }
      .segmented .label {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-muted-foreground);
        padding: 0 6px;
      }
      .chip {
        border: 0;
        background: transparent;
        cursor: pointer;
        font-family: inherit;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-muted-foreground);
        padding: 5px 10px;
        border-radius: 6px;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .chip.on {
        background: var(--primary-soft);
        color: var(--primary);
      }
      .chip:hover:not(.on) {
        color: var(--color-foreground);
      }
      .search {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--color-border);
        background: var(--color-card);
        font-size: 12px;
        color: var(--color-muted-foreground);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .search:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-soft);
      }
      .search .material-symbols-outlined {
        font-size: 16px;
      }
      .search input {
        border: 0;
        outline: 0;
        background: transparent;
        font: inherit;
        font-weight: 500;
        color: var(--color-foreground);
        width: 180px;
      }
      .toolbar-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .load-ms {
        font-size: 11px;
        font-weight: 500;
        color: var(--color-muted-foreground);
        font-variant-numeric: tabular-nums;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 6px 13px;
        font-family: inherit;
        font-size: 11px;
        font-weight: 700;
        border: 1px solid var(--color-border);
        background: var(--color-card);
        color: var(--color-foreground);
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .btn:hover {
        border-color: var(--primary);
      }
      .btn .material-symbols-outlined {
        font-size: 15px;
        color: var(--color-muted-foreground);
      }

      /* ── Table ── */
      .table-zone {
        flex: 1;
        overflow: hidden;
        padding: 16px 28px 20px;
        display: flex;
        flex-direction: column;
      }
      .table-card {
        flex: 1;
        overflow: auto;
        background: var(--color-card);
        border: 1px solid var(--color-rule);
        border-radius: 10px;
        box-shadow: 0 1px 3px rgba(18, 20, 44, 0.05);
      }
      table {
        width: 100%;
        min-width: 1280px;
        border-collapse: collapse;
        table-layout: fixed;
      }
      thead th {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--color-card);
        padding: 10px 14px;
        text-align: left;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.13em;
        color: var(--color-muted-foreground);
        border-bottom: 2px solid var(--primary);
      }
      thead th.num {
        text-align: right;
      }
      tbody td {
        padding: 12px 14px;
        vertical-align: middle;
        border-top: 1px solid var(--color-rule-soft);
        font-size: 12px;
      }
      tbody tr {
        transition: background 0.12s;
      }
      tbody tr:hover {
        background: var(--primary-soft);
      }
      tbody tr.late {
        background: rgba(220, 53, 69, 0.05);
      }
      tbody tr.late:hover {
        background: rgba(220, 53, 69, 0.1);
      }
      td.idx {
        font-family: var(--font-fraunces);
        font-size: 13px;
        color: var(--color-muted-foreground);
      }
      tr.late td.idx {
        box-shadow: inset 3px 0 var(--danger);
      }
      .cell-main {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .cell-main .ref2 {
        font-weight: 500;
        color: var(--color-muted-foreground);
      }
      .cell-sub {
        margin-top: 2px;
        font-size: 11.5px;
        font-weight: 500;
        line-height: 1.35;
        color: var(--gray);
      }
      .art {
        color: var(--primary);
        font-weight: 700;
        font-size: 13px;
      }
      .type-tag {
        display: inline-block;
        background: var(--primary-soft);
        color: var(--primary);
        border-radius: 4px;
        padding: 2px 7px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      td.qty {
        text-align: right;
        white-space: nowrap;
      }
      .qty-big {
        font-family: var(--font-fraunces);
        font-size: 20px;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .qty-u {
        font-size: 10px;
        font-weight: 500;
        color: var(--color-muted-foreground);
        margin-left: 2px;
      }
      td.date {
        white-space: nowrap;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      td.date.late-d {
        color: var(--danger);
        font-weight: 800;
      }

      .emp {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .emp-pill {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        border: 1px solid var(--color-border);
        border-radius: 5px;
        padding: 2px 7px;
        font-size: 10.5px;
        font-weight: 600;
        line-height: 1.5;
        background: var(--color-card);
      }
      .emp-pill.alloc {
        border-color: rgba(40, 167, 69, 0.35);
        background: rgba(40, 167, 69, 0.08);
        color: #1d7a33;
      }
      .emp-pill .nm {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .emp-pill .material-symbols-outlined {
        font-size: 12px;
      }
      .emp-pill .q {
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }
      .emp-pill .pal {
        background: var(--color-muted);
        border-radius: 3px;
        padding: 0 5px;
        font-size: 9.5px;
        font-weight: 700;
        color: var(--color-foreground);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
        border-radius: 999px;
        padding: 3px 9px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .badge .material-symbols-outlined {
        font-size: 13px;
      }
      .b-exp {
        background: rgba(40, 167, 69, 0.12);
        color: var(--success);
      }
      .b-alc {
        background: rgba(255, 193, 7, 0.18);
        color: var(--warning);
      }
      .b-ret {
        background: rgba(220, 53, 69, 0.11);
        color: var(--danger);
      }
      .b-ras {
        background: var(--color-muted);
        color: var(--color-muted-foreground);
      }
      .b-cq {
        background: rgba(23, 162, 184, 0.12);
        color: var(--info);
      }
      .badge-stack {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .cause-l {
        font-size: 12px;
        font-weight: 500;
        line-height: 1.4;
      }
      .cause-comps {
        margin-top: 3px;
        font-size: 10.5px;
        font-weight: 800;
        color: var(--danger);
        font-variant-numeric: tabular-nums;
      }
      .cause-eta {
        margin-top: 2px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10.5px;
        font-weight: 600;
        color: var(--info);
      }
      .cause-eta .material-symbols-outlined {
        font-size: 12px;
      }
      .cause-retro {
        margin-top: 2px;
        font-size: 10px;
        font-weight: 500;
        color: var(--color-muted-foreground);
      }
      .dash {
        color: var(--color-muted-foreground);
        opacity: 0.6;
      }

      /* Couverture (proactif) */
      .of-line {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11.5px;
        font-weight: 600;
      }
      .of-tag {
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .t-wof {
        background: rgba(40, 167, 69, 0.14);
        color: var(--success);
      }
      .t-wop {
        background: rgba(23, 162, 184, 0.14);
        color: var(--info);
      }
      .t-wos {
        background: rgba(255, 193, 7, 0.2);
        color: var(--warning);
      }
      .cover-ok {
        display: inline-flex;
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 10.5px;
        font-weight: 800;
        background: rgba(40, 167, 69, 0.12);
        color: var(--success);
      }
      .goulot {
        display: flex;
        flex-direction: column;
        gap: 1px;
        margin-bottom: 6px;
      }
      .goulot:last-child {
        margin-bottom: 0;
      }
      .goulot .top {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .goulot .c-art {
        font-size: 11px;
        font-weight: 800;
        color: var(--danger);
      }
      .goulot .c-desc {
        font-size: 10px;
        color: var(--color-muted-foreground);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .goulot .c-qty {
        margin-left: auto;
        background: rgba(220, 53, 69, 0.1);
        color: var(--danger);
        border-radius: 4px;
        padding: 0 5px;
        font-size: 10px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }
      .goulot .c-eta {
        font-size: 9.5px;
        font-weight: 600;
        color: var(--color-muted-foreground);
      }
      .goulot .c-eta.overdue {
        color: var(--danger);
        font-weight: 800;
      }

      /* Footer résumé */
      .foot {
        flex: none;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 8px 28px;
        border-top: 1px solid var(--color-rule);
        background: var(--color-card);
        font-size: 11px;
        font-weight: 600;
        color: var(--color-muted-foreground);
      }
      .foot b {
        color: var(--color-foreground);
      }
      .foot .item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .foot .sw {
        width: 9px;
        height: 9px;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <header class="masthead">
      <div class="masthead-top">
        <div class="brand">
          <div class="wordmark">Supply Chain <em>AERECO</em></div>
          <div class="subtitle">Suivi · Allocation &amp; expédition</div>
          <span class="env-pill"><span class="dot"></span>Prod</span>
        </div>
        <div class="meta">
          <div class="week">Jeudi 3 juillet</div>
          <div><b id="meta-total">12</b> lignes ouvertes · réf. <b>2026-07-03</b></div>
        </div>
      </div>
      <nav class="tabs">
        <a href="#">Tableau</a>
        <a href="#">Programme</a>
        <a href="#">Charge</a>
        <a href="#">Ruptures</a>
        <a href="#" class="active">Suivi</a>
        <a href="#">Expéditions</a>
        <a href="#">Config</a>
        <div class="user-chip"><span class="avatar">AB</span></div>
      </nav>
    </header>

    <!-- KPI = filtres (clic pour filtrer, re-clic pour tout afficher) -->
    <section class="kpis" id="kpis"></section>

    <div class="toolbar">
      <div class="segmented" role="tablist">
        <button class="chip on" id="m-reactif">Réactif</button>
        <button class="chip" id="m-proactif">Proactif</button>
      </div>
      <div class="search">
        <span class="material-symbols-outlined">search</span>
        <input id="q" placeholder="Commande, article, client…" />
      </div>
      <div class="segmented" id="types">
        <span class="label">Type</span>
        <button class="chip on" data-t="MTS">MTS</button>
        <button class="chip on" data-t="MTO">MTO</button>
        <button class="chip on" data-t="NOR">NOR</button>
      </div>
      <div class="segmented" id="ateliers">
        <span class="label">Atelier</span>
        <button class="chip" data-a="BDH">Montage BDH</button>
        <button class="chip" data-a="KIT">Kits VMC</button>
        <button class="chip" data-a="VAM">Ventilateurs</button>
        <button class="chip" data-a="EAH">Entrées d'air</button>
      </div>
      <div class="toolbar-right">
        <span class="load-ms" title="Durée dernier chargement X3">2.4s</span>
        <button class="btn">
          <span class="material-symbols-outlined">refresh</span>Actualiser
        </button>
        <button class="btn">
          <span class="material-symbols-outlined">calendar_month</span>Aujourd'hui
        </button>
      </div>
    </div>

    <div class="table-zone">
      <div class="table-card">
        <table id="tbl">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="foot" id="foot"></div>

    <script>
      /* ── Données mock (réalistes Aereco) ─────────────────────────── */
      const ROWS = [
        {
          n: 'F24-08096',
          refC: '4501128834',
          client: 'Aereco GmbH',
          art: 'VAM-T4-µW',
          refA: '',
          des: 'Ventilateur VAM T4 MicroWatt',
          type: 'MTO',
          at: 'VAM',
          st: 'ret',
          reste: 6,
          exp: '27/06',
          late: true,
          emp: [],
          cause: {
            l: 'Composant arrivé tard après affermissement OF',
