[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "integration-sdk"
version = "0.1.0"
description = "HTTP clients for monorepo service-to-service communication"
requires-python = ">=3.11"
dependencies = [
  "domain-contracts>=0.1.0",
  "httpx>=0.27.0"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
