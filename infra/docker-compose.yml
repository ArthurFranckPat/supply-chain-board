version: "3.9"

services:
  planning-engine-api:
    image: python:3.11-slim
    working_dir: /workspace/apps/planning-engine
    volumes:
      - ../:/workspace
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn planning_engine.api.server:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  suivi-api:
    image: python:3.11-slim
    working_dir: /workspace/apps/suivi-commandes
    volumes:
      - ../:/workspace
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn suivi_commandes.api:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"

  integration-hub:
    image: python:3.11-slim
    working_dir: /workspace/services/integration-hub
    volumes:
      - ../:/workspace
    environment:
      PLANNING_ENGINE_API_URL: http://planning-engine-api:8000
      SUIVI_API_URL: http://suivi-api:8001
    command: >
      sh -c "pip install -e /workspace/packages/domain-contracts &&
             pip install -e /workspace/packages/integration-sdk &&
             pip install -e /workspace/services/integration-hub &&
             uvicorn integration_hub.api:app --host 0.0.0.0 --port 8010"
    ports:
      - "8010:8010"
    depends_on:
      - planning-engine-api
      - suivi-api

  board-ui:
    image: node:22-alpine
    working_dir: /workspace/apps/board-ui
    volumes:
      - ../:/workspace
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
      VITE_SUIVI_API_BASE_URL: http://127.0.0.1:8001
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
