[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "erp-data-access"
version = "0.1.0"
description = "Shared ERP data loading layer for the supply-chain monorepo"
requires-python = ">=3.11"
dependencies = [
  "pandas>=2.0.0",
  "numpy>=1.26.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
