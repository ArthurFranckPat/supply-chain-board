[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "domain-contracts"
version = "0.1.0"
description = "Shared Pydantic contracts for the supply-chain monorepo"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.8.0"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
